name: Publish .NET tool

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/publish-package.yml
      - README.md
      - src/Csdbg.Core/**
      - src/Csdbg.Mcp/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write

concurrency:
  group: publish-Csdbg.Mcp
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore csdbg.slnx
      - name: Test
        run: dotnet test csdbg.slnx --configuration Release --no-restore
      - name: Pack
        run: dotnet pack src/Csdbg.Mcp/Csdbg.Mcp.csproj --configuration Release --no-restore --output artifacts
      - name: Log in to NuGet.org
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: vincepr
      - name: Publish to NuGet.org
        run: >-
          dotnet nuget push artifacts/*.nupkg
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source "https://api.nuget.org/v3/index.json"
          --skip-duplicate
      # GitHub Packages is a best-effort mirror; NuGet.org remains the required release target.
      - name: Publish to GitHub Packages
        continue-on-error: true
        run: >-
          dotnet nuget push artifacts/*.nupkg
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --source "https://nuget.pkg.github.com/vincepr/index.json"
          --skip-duplicate
